# @package _global_

eval_timestamp: ${now:%Y%m%d_%H%M%S}
eval_name: TEST
eval_log_dir: logs_eval/${eval_name}/${eval_timestamp}
hydra:
  run:
    dir: ${eval_log_dir}

auto_record: false
auto_record_num_frames: 600
disable_keyboard_listener: true
offscreen_record: false
offscreen_record_width: 1600
offscreen_record_height: 900
offscreen_record_fps: 50
